#
# /password anti-bruteforce (gateway side)
# NOTE:
# 1) The following zones must be declared in nginx `http` context:
#    limit_req_zone  $binary_remote_addr zone=photo_password_ip:10m rate=5r/m;
#    limit_conn_zone $binary_remote_addr zone=photo_password_conn:10m;
# 2) Quick rollback: comment `limit_req` and `limit_conn` in this location only.
#
location = /ugreen/v5/photo/share/white/password {
        client_body_timeout 10s;
        client_max_body_size 1m;

        # IP-based brute-force mitigation (fixed rate for native nginx)
        limit_req zone=photo_password_ip burst=3 nodelay;
        limit_conn photo_password_conn 1;
        limit_req_status 429;
        limit_conn_status 429;
        add_header Retry-After "60" always;

        proxy_pass_request_headers on;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 1h;
        proxy_read_timeout 1h;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_pass http://photo_backend;
        proxy_intercept_errors on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
}

location ~ ^/ugreen/(v1|v2)/photo/(?!(setting/public/library|desk/card/set|desk/card/display|auth/transcode/getPathPermission|external/transcode/verify|list/top|list/directory|setting/library/status)) {
        default_type application/json;
        return 200 '{"code":9406,"data":{},"msg":"","err_data":{"app_id":"com.ugreen.photo"}}';
}
location ~ ^/ugreen/v[\d]+/photo/ {
        client_body_timeout 10s;
        client_max_body_size 0;

        proxy_pass_request_headers on;
        proxy_request_buffering off;
        fastcgi_request_buffering  off;
        scgi_request_buffering off;
        proxy_buffering off;
        fastcgi_buffering off;
        scgi_buffering off;
        client_body_buffer_size 128k;
        resolver_timeout 5s;
        send_timeout 10s;
        keepalive_timeout 300s;
        tcp_nopush on;
        tcp_nodelay on;
        proxy_redirect off;
        chunked_transfer_encoding on;
        proxy_cache off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 1h;
        proxy_read_timeout 1h;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_pass http://photo_backend;
        proxy_intercept_errors on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

}

