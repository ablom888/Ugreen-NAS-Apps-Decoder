if $programname == 'comic_serv' then {
    action(type="omfile"
           file="/var/ugreen/log/comic_serv.slog"
           template="UgLogFormat"
           fileCreateMode="0600"
           dirCreateMode="0755"
           createDirs="on")
    stop
}
if $programname == 'comic_serv_gin' then {
    action(type="omfile"
           file="/var/ugreen/log/comic_serv_gin.slog"
           template="UgLogFormat"
           fileCreateMode="0600"
           dirCreateMode="0755"
           createDirs="on")
    stop
}
