if $programname == 'iscsi_serv' then {
    action(type="omfile"
           file="/var/ugreen/log/iscsi_serv.slog"
           template="UgLogFormat"
           fileCreateMode="0600"
           dirCreateMode="0755"
           createDirs="on")
    stop
}

if $programname == 'iscsi_serv_gin' then {
    action(type="omfile"
           file="/var/ugreen/log/iscsi_serv_gin.slog"
           template="UgLogFormat"
           fileCreateMode="0600"
           dirCreateMode="0755"
           createDirs="on")
    stop
}
