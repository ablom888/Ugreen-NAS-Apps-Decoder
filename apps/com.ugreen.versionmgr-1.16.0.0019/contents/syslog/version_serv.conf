if $programname == 'version_serv' then {
    action(type="omfile"
           file="/var/ugreen/log/version_serv.slog"
           template="UgLogFormat"
           fileCreateMode="0600"
           dirCreateMode="0755"
           createDirs="on")
    stop
}
if $programname == 'version_serv_gin' then {
    action(type="omfile"
           file="/var/ugreen/log/version_serv_gin.slog"
           template="UgLogFormat"
           fileCreateMode="0600"
           dirCreateMode="0755"
           createDirs="on")
    stop
}