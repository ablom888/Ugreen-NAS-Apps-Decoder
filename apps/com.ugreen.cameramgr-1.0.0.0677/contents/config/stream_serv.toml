
[applog]
dirpath = "/var/ugreen/log"
fileprefix = "stream_serv"
# fatal|error|warn|info|debug|trace
loglevel = "info"
max_filemb = 50
backup_filecnt = 5
#日志是否同步输出到控制台
output_console = true

[appcontrol]
#是否启用crash core dump， 文件生成在/tmp目录
enable_coredump = true

[ffmpeg]
loglevel = "warn"


[debug]

