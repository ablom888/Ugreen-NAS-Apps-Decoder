location ~ ^/ugreen/v1/cameramgr/ums/ {
    # 禁止通过 Nginx 直接访问 UMS 接口
    default_type application/json;
    return 403 '{"code":600403,"msg":"Forbidden"}';
}

location ~ ^/ugreen/v1/cameramgr {
        client_body_timeout 10s;
        client_max_body_size 0;
        client_body_buffer_size 15m;

        proxy_pass_request_headers on;
        proxy_request_buffering off;
        fastcgi_request_buffering  off;
        scgi_request_buffering off;
        proxy_buffering off;
        fastcgi_buffering off;
        scgi_buffering off;
        resolver_timeout 5s;
        keepalive_timeout 60s;
        tcp_nopush on;
        tcp_nodelay on;
        proxy_redirect off;
        chunked_transfer_encoding on;
        proxy_cache off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 1h;
        proxy_read_timeout 1h;
        proxy_max_temp_file_size 0;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;

        proxy_pass http://unix:/var/ugreen/cameramgr_serv.sock;
        proxy_intercept_errors on;
}

location ~ ^/ugreen/v1/camerams/(.*) {

    proxy_set_header Host $http_host;
    proxy_set_header Port $server_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection upgrade;

    proxy_pass http://unix:/var/ugreen/camerams_serv.sock:/$1$is_args$args;
    proxy_intercept_errors on;
}
